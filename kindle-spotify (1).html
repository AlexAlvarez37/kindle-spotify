<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Kindle Spotify</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Source+Serif+4:wght@300;400;600&display=swap');

  :root {
    --ink: #1a1a18;
    --ink-light: #3d3d38;
    --ink-faint: #7a7a72;
    --paper: #f4f0e8;
    --paper-dark: #e8e3d8;
    --paper-darker: #d8d2c4;
    --accent: #1a1a18;
    --green: #1DB954;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Source Serif 4', Georgia, serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    /* Kindle e-ink friendly: high contrast, no gradients in critical areas */
  }

  /* ── LOGIN SCREEN ── */
  #login-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
    max-width: 480px;
    width: 100%;
    text-align: center;
  }

  .logo-mark {
    width: 72px;
    height: 72px;
    border: 3px solid var(--ink);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -1px;
  }

  .app-title {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    font-weight: 700;
    letter-spacing: -1px;
    line-height: 1;
  }

  .app-subtitle {
    font-size: 15px;
    color: var(--ink-faint);
    font-weight: 300;
    letter-spacing: 0.5px;
    line-height: 1.6;
  }

  .divider {
    width: 48px;
    height: 2px;
    background: var(--ink);
  }

  .setup-box {
    width: 100%;
    border: 2px solid var(--ink);
    padding: 24px;
    text-align: left;
  }

  .setup-box h3 {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    margin-bottom: 16px;
    letter-spacing: 0.3px;
  }

  .field {
    margin-bottom: 14px;
  }

  .field label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--ink-faint);
    margin-bottom: 6px;
    font-weight: 600;
  }

  .field input {
    width: 100%;
    border: 1.5px solid var(--paper-darker);
    background: var(--paper);
    padding: 10px 12px;
    font-size: 14px;
    font-family: 'Source Serif 4', serif;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s;
  }

  .field input:focus {
    border-color: var(--ink);
  }

  .field input::placeholder {
    color: var(--ink-faint);
    opacity: 0.6;
  }

  .btn-primary {
    width: 100%;
    background: var(--ink);
    color: var(--paper);
    border: none;
    padding: 14px;
    font-family: 'Source Serif 4', serif;
    font-size: 14px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.15s;
  }

  .btn-primary:hover { opacity: 0.85; }
  .btn-primary:active { opacity: 0.7; }

  .note {
    font-size: 12px;
    color: var(--ink-faint);
    text-align: center;
    line-height: 1.6;
  }

  /* ── PLAYER SCREEN ── */
  #player-screen {
    display: none;
    flex-direction: column;
    width: 100%;
    max-width: 560px;
    gap: 0;
  }

  .player-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 16px;
    border-bottom: 2px solid var(--ink);
    margin-bottom: 0;
  }

  .player-header .wordmark {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .connection-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--ink-faint);
    display: inline-block;
    margin-right: 6px;
  }

  .connection-dot.connected { background: var(--green); }

  .conn-label {
    font-size: 12px;
    color: var(--ink-faint);
    letter-spacing: 0.5px;
  }

  /* Now playing card */
  .now-playing {
    border: 2px solid var(--ink);
    border-top: none;
    padding: 28px 24px 24px;
    background: var(--paper);
  }

  .np-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--ink-faint);
    font-weight: 600;
    margin-bottom: 20px;
  }

  .track-layout {
    display: flex;
    gap: 20px;
    align-items: flex-start;
    margin-bottom: 24px;
  }

  .album-art {
    width: 100px;
    height: 100px;
    border: 2px solid var(--ink);
    background: var(--paper-dark);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .album-art img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    /* desaturate for e-ink aesthetic */
    filter: grayscale(40%) contrast(1.05);
  }

  .album-art-placeholder {
    font-size: 32px;
    color: var(--ink-faint);
    opacity: 0.4;
  }

  .track-info {
    flex: 1;
    min-width: 0;
  }

  .track-name {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 6px;
    word-break: break-word;
  }

  .track-artist {
    font-size: 15px;
    color: var(--ink-light);
    margin-bottom: 4px;
    font-weight: 300;
  }

  .track-album {
    font-size: 12px;
    color: var(--ink-faint);
    font-style: italic;
  }

  /* Progress bar */
  .progress-wrap {
    margin-bottom: 20px;
  }

  .progress-bar-bg {
    width: 100%;
    height: 3px;
    background: var(--paper-darker);
    cursor: pointer;
    position: relative;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--ink);
    width: 0%;
    transition: width 0.5s linear;
    pointer-events: none;
  }

  .progress-times {
    display: flex;
    justify-content: space-between;
    margin-top: 6px;
  }

  .time-label {
    font-size: 11px;
    color: var(--ink-faint);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.5px;
  }

  /* Controls */
  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    border-top: 1.5px solid var(--paper-darker);
    padding-top: 20px;
  }

  .ctrl-btn {
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    padding: 10px 16px;
    transition: opacity 0.12s;
    color: var(--ink);
    flex: 1;
  }

  .ctrl-btn:hover { opacity: 0.6; }
  .ctrl-btn:active { opacity: 0.4; }

  .ctrl-btn.active svg { stroke: var(--green); fill: var(--green); }
  .ctrl-btn.active .ctrl-label { color: var(--green); }

  .ctrl-btn svg {
    width: 28px;
    height: 28px;
    stroke: var(--ink);
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .ctrl-btn.play-btn svg {
    width: 52px;
    height: 52px;
    stroke-width: 1.5;
  }

  .ctrl-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--ink-faint);
    font-weight: 600;
  }

  /* Mode toggles */
  .mode-row {
    display: flex;
    gap: 0;
    border-top: 1.5px solid var(--paper-darker);
    margin-top: 4px;
  }

  .mode-btn {
    flex: 1;
    background: none;
    border: none;
    cursor: pointer;
    padding: 14px 8px;
    font-family: 'Source Serif 4', serif;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--ink-faint);
    font-weight: 600;
    transition: all 0.15s;
    border-right: 1.5px solid var(--paper-darker);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
  }

  .mode-btn:last-child { border-right: none; }
  .mode-btn:hover { background: var(--paper-dark); color: var(--ink); }
  .mode-btn.active {
    background: var(--ink);
    color: var(--paper);
  }

  .mode-btn svg {
    width: 14px;
    height: 14px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    flex-shrink: 0;
  }

  /* Device section */
  .device-row {
    border: 2px solid var(--ink);
    border-top: none;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--paper-dark);
  }

  .device-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--ink-faint);
    font-weight: 600;
  }

  .device-name {
    font-size: 13px;
    color: var(--ink);
    font-style: italic;
  }

  .refresh-btn {
    background: none;
    border: 1.5px solid var(--ink);
    padding: 6px 14px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
    font-family: 'Source Serif 4', serif;
    color: var(--ink);
    transition: all 0.12s;
  }

  .refresh-btn:hover { background: var(--ink); color: var(--paper); }

  /* Status bar */
  .status-bar {
    text-align: center;
    padding: 10px;
    font-size: 12px;
    color: var(--ink-faint);
    font-style: italic;
    min-height: 34px;
  }

  /* Error */
  .error-msg {
    color: #8B0000;
    font-size: 12px;
    margin-top: 8px;
    text-align: center;
    font-style: italic;
  }

  /* Kindle tap zones — bigger touch targets */
  @media (max-width: 768px) {
    .ctrl-btn { padding: 14px 12px; }
    .ctrl-btn.play-btn svg { width: 60px; height: 60px; }
    .mode-btn { padding: 16px 8px; }
  }
</style>
</head>
<body>

<!-- ══════════════ LOGIN SCREEN ══════════════ -->
<div id="login-screen">
  <div class="logo-mark">♫</div>
  <div>
    <div class="app-title">Kindle<br/>Spotify</div>
  </div>
  <div class="divider"></div>
  <p class="app-subtitle">
    A minimal Spotify controller<br/>designed for e-ink displays.
  </p>

  <div class="setup-box">
    <h3>Connect your Spotify</h3>
    <div class="field">
      <label>Client ID</label>
      <input type="text" id="client-id" placeholder="Paste your Spotify Client ID" autocomplete="off" />
    </div>
    <div class="field">
      <label>Redirect URI</label>
      <input type="text" id="redirect-uri" placeholder="e.g. http://localhost:8888/callback" autocomplete="off" />
    </div>
    <button class="btn-primary" onclick="startAuth()">Connect with Spotify →</button>
    <div class="error-msg" id="login-error"></div>
  </div>

  <p class="note">
    Your credentials stay in your browser.<br/>
    Nothing is sent to any server.
  </p>
</div>

<!-- ══════════════ PLAYER SCREEN ══════════════ -->
<div id="player-screen">
  <div class="player-header">
    <span class="wordmark">Kindle Spotify</span>
    <span>
      <span class="connection-dot" id="conn-dot"></span>
      <span class="conn-label" id="conn-label">Connecting…</span>
    </span>
  </div>

  <div class="now-playing">
    <div class="np-label">Now Playing</div>

    <div class="track-layout">
      <div class="album-art" id="album-art">
        <span class="album-art-placeholder">♫</span>
      </div>
      <div class="track-info">
        <div class="track-name" id="track-name">—</div>
        <div class="track-artist" id="track-artist">—</div>
        <div class="track-album" id="track-album"></div>
      </div>
    </div>

    <div class="progress-wrap">
      <div class="progress-bar-bg" onclick="seekTo(event)">
        <div class="progress-bar-fill" id="progress-fill"></div>
      </div>
      <div class="progress-times">
        <span class="time-label" id="time-current">0:00</span>
        <span class="time-label" id="time-total">0:00</span>
      </div>
    </div>

    <div class="controls">
      <button class="ctrl-btn" onclick="skipPrev()" title="Previous">
        <svg viewBox="0 0 24 24"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
        <span class="ctrl-label">Prev</span>
      </button>

      <button class="ctrl-btn play-btn" id="play-btn" onclick="togglePlay()" title="Play/Pause">
        <svg id="play-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8" fill="currentColor" stroke="none"/></svg>
        <span class="ctrl-label" id="play-label">Play</span>
      </button>

      <button class="ctrl-btn" onclick="skipNext()" title="Next">
        <svg viewBox="0 0 24 24"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
        <span class="ctrl-label">Next</span>
      </button>
    </div>
  </div>

  <div class="mode-row">
    <button class="mode-btn" id="shuffle-btn" onclick="toggleShuffle()">
      <svg viewBox="0 0 24 24"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/></svg>
      Shuffle
    </button>
    <button class="mode-btn" id="repeat-btn" onclick="cycleRepeat()">
      <svg id="repeat-icon" viewBox="0 0 24 24"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
      <span id="repeat-label">Repeat</span>
    </button>
  </div>

  <div class="device-row">
    <div>
      <div class="device-label">Playing on</div>
      <div class="device-name" id="device-name">—</div>
    </div>
    <button class="refresh-btn" onclick="fetchState()">Refresh</button>
  </div>

  <div class="status-bar" id="status-bar">Loading…</div>
</div>

<script>
// ══════════════════════════════════════════
//  CONFIG & STATE
// ══════════════════════════════════════════
const SCOPES = [
  'user-read-playback-state',
  'user-modify-playback-state',
  'user-read-currently-playing'
].join(' ');

let accessToken = null;
let refreshToken = null;
let clientId = null;
let redirectUri = null;
let pollTimer = null;
let progressTimer = null;
let currentState = null;
let repeatMode = 'off'; // off | context | track

// ══════════════════════════════════════════
//  AUTH  (Implicit Grant — token in URL hash,
//         no callback/popup needed)
// ══════════════════════════════════════════
function generateCodeVerifier(len = 128) {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~';
  let v = '';
  const arr = new Uint8Array(len);
  crypto.getRandomValues(arr);
  arr.forEach(b => v += chars[b % chars.length]);
  return v;
}

async function generateCodeChallenge(verifier) {
  const data = new TextEncoder().encode(verifier);
  const digest = await crypto.subtle.digest('SHA-256', data);
  return btoa(String.fromCharCode(...new Uint8Array(digest)))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
}

async function startAuth() {
  clientId = document.getElementById('client-id').value.trim();
  redirectUri = document.getElementById('redirect-uri').value.trim();
  const err = document.getElementById('login-error');

  if (!clientId) { err.textContent = 'Please enter your Client ID.'; return; }
  if (!redirectUri) { err.textContent = 'Please enter the Redirect URI.'; return; }
  err.textContent = '';

  localStorage.setItem('ks_client_id', clientId);
  localStorage.setItem('ks_redirect_uri', redirectUri);

  const verifier = generateCodeVerifier();
  const challenge = await generateCodeChallenge(verifier);
  localStorage.setItem('ks_code_verifier', verifier);

  const params = new URLSearchParams({
    client_id: clientId,
    response_type: 'code',
    redirect_uri: redirectUri,
    scope: SCOPES,
    code_challenge_method: 'S256',
    code_challenge: challenge,
  });

  window.location.href = `https://accounts.spotify.com/authorize?${params}`;
}

async function handleCallback(code) {
  clientId = localStorage.getItem('ks_client_id');
  redirectUri = localStorage.getItem('ks_redirect_uri');
  const verifier = localStorage.getItem('ks_code_verifier');

  const res = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({
      grant_type: 'authorization_code',
      code,
      redirect_uri: redirectUri,
      client_id: clientId,
      code_verifier: verifier,
    })
  });

  const data = await res.json();
  if (data.access_token) {
    accessToken = data.access_token;
    refreshToken = data.refresh_token;
    localStorage.setItem('ks_refresh_token', refreshToken);
    localStorage.setItem('ks_access_token', accessToken);
    window.history.replaceState({}, '', window.location.pathname);
    showPlayer();
  } else {
    document.getElementById('login-error').textContent = 'Auth failed: ' + (data.error_description || data.error);
  }
}

async function doRefreshToken() {
  const rt = refreshToken || localStorage.getItem('ks_refresh_token');
  clientId = clientId || localStorage.getItem('ks_client_id');
  if (!rt || !clientId) return false;

  const res = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({
      grant_type: 'refresh_token',
      refresh_token: rt,
      client_id: clientId,
    })
  });
  const data = await res.json();
  if (data.access_token) {
    accessToken = data.access_token;
    localStorage.setItem('ks_access_token', accessToken);
    if (data.refresh_token) {
      refreshToken = data.refresh_token;
      localStorage.setItem('ks_refresh_token', refreshToken);
    }
    return true;
  }
  return false;
}

// ══════════════════════════════════════════
//  SPOTIFY API
// ══════════════════════════════════════════
async function spotifyFetch(path, method = 'GET', body = null) {
  if (!accessToken) accessToken = localStorage.getItem('ks_access_token');
  const opts = {
    method,
    headers: { 'Authorization': 'Bearer ' + accessToken }
  };
  if (body) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  let res = await fetch('https://api.spotify.com/v1' + path, opts);
  if (res.status === 401) {
    const ok = await doRefreshToken();
    if (ok) {
      opts.headers['Authorization'] = 'Bearer ' + accessToken;
      res = await fetch('https://api.spotify.com/v1' + path, opts);
    } else {
      logout();
      return null;
    }
  }
  if (res.status === 204 || res.status === 202 || res.status === 200) {
    try { return await res.json(); } catch { return {}; }
  }
  return null;
}

// ══════════════════════════════════════════
//  PLAYER CONTROLS
// ══════════════════════════════════════════
async function togglePlay() {
  if (!currentState) return;
  const isPlaying = currentState.is_playing;
  await spotifyFetch(isPlaying ? '/me/player/pause' : '/me/player/play', 'PUT');
  setTimeout(fetchState, 300);
}

async function skipNext() {
  await spotifyFetch('/me/player/next', 'POST');
  setTimeout(fetchState, 500);
}

async function skipPrev() {
  // If more than 3s in, restart track instead
  const pos = currentState?.progress_ms || 0;
  if (pos > 3000) {
    await spotifyFetch('/me/player/seek?position_ms=0', 'PUT');
  } else {
    await spotifyFetch('/me/player/previous', 'POST');
  }
  setTimeout(fetchState, 500);
}

async function toggleShuffle() {
  const current = currentState?.shuffle_state || false;
  await spotifyFetch(`/me/player/shuffle?state=${!current}`, 'PUT');
  setTimeout(fetchState, 400);
}

async function cycleRepeat() {
  const modes = ['off', 'context', 'track'];
  const current = currentState?.repeat_state || 'off';
  const next = modes[(modes.indexOf(current) + 1) % modes.length];
  await spotifyFetch(`/me/player/repeat?state=${next}`, 'PUT');
  setTimeout(fetchState, 400);
}

async function seekTo(e) {
  if (!currentState?.item?.duration_ms) return;
  const rect = e.currentTarget.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  const ms = Math.floor(pct * currentState.item.duration_ms);
  await spotifyFetch(`/me/player/seek?position_ms=${ms}`, 'PUT');
  setTimeout(fetchState, 300);
}

// ══════════════════════════════════════════
//  STATE FETCH & UI UPDATE
// ══════════════════════════════════════════
async function fetchState() {
  const data = await spotifyFetch('/me/player');
  if (!data || !data.item) {
    setStatus('Nothing playing. Start something on Spotify!');
    setConnected(false);
    return;
  }
  currentState = data;
  setConnected(true);
  updateUI(data);
}

function updateUI(state) {
  const track = state.item;
  const isPlaying = state.is_playing;

  // Track info
  document.getElementById('track-name').textContent = track.name;
  document.getElementById('track-artist').textContent =
    track.artists.map(a => a.name).join(', ');
  document.getElementById('track-album').textContent = track.album?.name || '';

  // Album art
  const artEl = document.getElementById('album-art');
  const imgUrl = track.album?.images?.[0]?.url;
  if (imgUrl) {
    artEl.innerHTML = `<img src="${imgUrl}" alt="Album art" />`;
  } else {
    artEl.innerHTML = `<span class="album-art-placeholder">♫</span>`;
  }

  // Progress
  updateProgress(state.progress_ms, track.duration_ms);

  // Play/pause icon
  const playIcon = document.getElementById('play-icon');
  const playLabel = document.getElementById('play-label');
  if (isPlaying) {
    playIcon.innerHTML = `<circle cx="12" cy="12" r="10"/><line x1="10" y1="15" x2="10" y2="9"/><line x1="14" y1="15" x2="14" y2="9"/>`;
    playLabel.textContent = 'Pause';
  } else {
    playIcon.innerHTML = `<circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8" fill="currentColor" stroke="none"/>`;
    playLabel.textContent = 'Play';
  }

  // Shuffle
  const shuffleBtn = document.getElementById('shuffle-btn');
  shuffleBtn.classList.toggle('active', !!state.shuffle_state);

  // Repeat
  const repeatBtn = document.getElementById('repeat-btn');
  const repeatLabel = document.getElementById('repeat-label');
  const repeatIcon = document.getElementById('repeat-icon');
  const rm = state.repeat_state || 'off';
  repeatBtn.classList.toggle('active', rm !== 'off');
  if (rm === 'track') {
    repeatLabel.textContent = 'Repeat 1';
    repeatIcon.innerHTML = `<polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/><line x1="12" y1="9" x2="12" y2="15"/><text x="10" y="14" style="font-size:6px;fill:currentColor;stroke:none">1</text>`;
  } else {
    repeatLabel.textContent = rm === 'context' ? 'Repeat All' : 'Repeat';
    repeatIcon.innerHTML = `<polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>`;
  }

  // Device
  const dev = state.device;
  document.getElementById('device-name').textContent =
    dev ? `${dev.name} (${dev.type})` : 'Unknown';

  setStatus(isPlaying ? '▸ Playing' : '⏸ Paused');

  // Live progress tick
  clearInterval(progressTimer);
  if (isPlaying) {
    let ms = state.progress_ms;
    progressTimer = setInterval(() => {
      ms += 1000;
      if (ms >= track.duration_ms) {
        clearInterval(progressTimer);
        setTimeout(fetchState, 500);
        return;
      }
      updateProgress(ms, track.duration_ms);
    }, 1000);
  }
}

function updateProgress(ms, total) {
  const pct = total > 0 ? (ms / total) * 100 : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('time-current').textContent = fmtTime(ms);
  document.getElementById('time-total').textContent = fmtTime(total);
}

function fmtTime(ms) {
  const s = Math.floor(ms / 1000);
  return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
}

function setConnected(ok) {
  document.getElementById('conn-dot').className = 'connection-dot' + (ok ? ' connected' : '');
  document.getElementById('conn-label').textContent = ok ? 'Connected' : 'Not connected';
}

function setStatus(msg) {
  document.getElementById('status-bar').textContent = msg;
}

// ══════════════════════════════════════════
//  SCREEN SWITCHING
// ══════════════════════════════════════════
function showPlayer() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('player-screen').style.display = 'flex';
  fetchState();
  pollTimer = setInterval(fetchState, 10000); // poll every 10s
}

function showLogin() {
  clearInterval(pollTimer);
  clearInterval(progressTimer);
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('player-screen').style.display = 'none';
}

function logout() {
  localStorage.removeItem('ks_access_token');
  localStorage.removeItem('ks_refresh_token');
  accessToken = null;
  refreshToken = null;
  showLogin();
}

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
window.addEventListener('load', async () => {
  // Restore saved credentials
  const savedId = localStorage.getItem('ks_client_id');
  const savedUri = localStorage.getItem('ks_redirect_uri');
  if (savedId) document.getElementById('client-id').value = savedId;
  if (savedUri) document.getElementById('redirect-uri').value = savedUri;

  // Check for PKCE callback (?code=...)
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const error = params.get('error');

  if (error) {
    document.getElementById('login-error').textContent = 'Spotify denied access: ' + error;
    window.history.replaceState({}, '', window.location.pathname);
    return;
  }

  if (code) {
    await handleCallback(code);
    return;
  }

  // Returning visit — use stored token
  const savedToken = localStorage.getItem('ks_access_token');
  const savedRefresh = localStorage.getItem('ks_refresh_token');
  if (savedToken && savedRefresh && savedId) {
    accessToken  = savedToken;
    refreshToken = savedRefresh;
    clientId     = savedId;
    redirectUri  = savedUri;
    showPlayer();
  }
});
</script>
